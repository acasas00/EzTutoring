<div class="page">
<h2>Attendance</h2>

<button onclick="clockIn()">Clock In</button>
<button onclick="clockOut()">Clock Out</button>

<p id="status"></p>
</div>

<script>
async function clockIn() {
    let res = await fetch('/clock-in', {method:'POST'});
    let data = await res.json();
    status.innerText = "Clocked In: " + new Date(data.time).toLocaleTimeString();
}

async function clockOut() {
    let res = await fetch('/clock-out', {method:'POST'});
    let data = await res.json();
    status.innerText = "Clocked Out: " + new Date(data.time).toLocaleTimeString();
}
</script>

</body>
</html>
