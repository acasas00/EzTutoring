<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<title>Dashboard</title>

<script src="script.js" defer></script>
<script defer>
document.addEventListener("DOMContentLoaded", () => {
    checkAuth();
    loadDashboard();
});
</script>

<style>
.page {
    max-width: 1000px;
    margin: auto;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
    margin-top: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
}

.card h3 {
    margin: 0;
    font-size: 16px;
    color: gray;
}

.card p {
    font-size: 22px;
    font-weight: bold;
    margin-top: 10px;
}

.quick {
    margin-top: 30px;
}

.quick button {
    padding: 12px;
    margin-right: 10px;
}

.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logout-btn {
    background: red;
    color: white;
    padding: 8px 12px;
    border: none;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="nav">
<div>
<a href="dashboard.html">Dashboard</a>
<a href="attendance.html">Attendance</a>
<a href="payslip.html">Payslip</a>
</div>

<button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="page">

<h2>Dashboard</h2>

<div class="cards">

<div class="card">
    <h3>Total Hours Worked</h3>
    <p id="hours">Loading...</p>
</div>

<div class="card">
    <h3>Hourly Rate</h3>
    <p>$20</p>
</div>

<div class="card">
    <h3>Total Earnings</h3>
    <p id="pay">Loading...</p>
</div>

<div class="card">
    <h3>Sessions Logged</h3>
    <p id="sessions">Loading...</p>
</div>

</div>

<div class="quick">
    <h3>Quick Actions</h3>

    <button onclick="go('attendance.html')">Go to Attendance</button>
    <button onclick="go('payslip.html')">View Payslip</button>
    <button onclick="loadDashboard()">Refresh Data</button>
</div>

</div>

<script>
async function loadDashboard() {
    try {
        // ✅ FIX: consistent backend URL
        let res = await fetch('http://localhost:3000/attendance');
        let sessions = await res.json();

        let totalHours = 0;

        sessions.forEach(s => {
            if (s.clockIn && s.clockOut) {
                let diff = (new Date(s.clockOut) - new Date(s.clockIn)) / (1000 * 60 * 60);
                totalHours += diff;
            }
        });

        let hourlyRate = 20;
        let totalPay = totalHours * hourlyRate;

        document.getElementById("hours").innerText = totalHours.toFixed(2) + " hrs";
        document.getElementById("pay").innerText = "$" + totalPay.toFixed(2);
        document.getElementById("sessions").innerText = sessions.length;

    } catch (err) {
        document.getElementById("hours").innerText = "Error";
        document.getElementById("pay").innerText = "Error";
        document.getElementById("sessions").innerText = "Error";
    }
}

function go(page) {
    window.location.href = page;
}
</script>

</body>
</html>
